<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Children of Christ Inc | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html"><img src="assets/logo.svg" alt="Children of Christ logo" />CHILDREN OF CHRIST INC</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="programs.html">Programs</a>
        <a class="active" href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="grid">
      <article class="card span-6">
        <h2>Contact Information</h2>
        <p><strong>Email:</strong> <a href="mailto:info@gloriadeo.us">info@gloriadeo.us</a></p>
        <p><strong>Address:</strong> 1018 ann ave, Dallas, TX 75223, United States</p>
        <p><strong>EIN:</strong> 99-4587420</p>
        <div class="actions">
          <button id="copyEmailBtn" type="button" class="btn btn-primary">Copy Email</button>
          <a class="btn btn-secondary" href="mailto:info@gloriadeo.us">Open Email App</a>
        </div>
      </article>

      <article class="card span-6">
        <h2>Send a Message</h2>
        <form id="contactForm" novalidate>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <button class="btn btn-primary" type="submit">Send via Email</button>
          <p id="statusMessage" class="status" aria-live="polite"></p>
        </form>
      </article>
    </section>
  </main>

  <footer class="site-footer">© <span id="year"></span> CHILDREN OF CHRIST INC · Dallas, TX</footer>
  <script src="script.js"></script>
</body>
</html>
